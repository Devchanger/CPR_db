spring.application.name=cpr_db

# ========== Database ==========
# Production: MySQL
# spring.datasource.url=jdbc:mysql://localhost:3306/cpr_db
# spring.datasource.username=root
# spring.datasource.password=your_password
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Development: H2 (in-memory, no install needed)
spring.datasource.url=jdbc:h2:mem:cprdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ========== JPA ==========
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ========== JWT ==========
# jwt.secret must be at least 32 characters
jwt.secret=${JWT_SECRET:LifeGuardCprTrainingPlatformJwtSecretKey2024AtLeast32Chars!}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ========== QA / RAG API (optional) ==========
qa.api.key=${QA_API_KEY:placeholder}
qa.api.url=${QA_API_URL:placeholder}
qa.api.model=${QA_API_MODEL:placeholder}
